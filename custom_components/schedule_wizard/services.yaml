run_valve:
  name: Run valve
  description: Open a valve (or switch/light/cover) for a given duration. Auto-closes when done.
  fields:
    entity_id:
      name: Entity
      description: The entity to open.
      required: true
      selector:
        entity:
          domain:
            - switch
            - valve
            - cover
            - input_boolean
            - light
    duration_minutes:
      name: Duration (minutes)
      description: How long to keep the valve open. Falls back to the valve's default if omitted.
      required: false
      example: 15
      selector:
        number:
          min: 1
          max: 1440
          step: 1
          unit_of_measurement: min
          mode: slider

stop_valve:
  name: Stop valve
  description: Close a valve immediately and cancel its auto-close timer.
  fields:
    entity_id:
      name: Entity
      required: true
      selector:
        entity:
          domain:
            - switch
            - valve
            - cover
            - input_boolean
            - light

add_valve:
  name: Add valve
  description: Register a valve with the scheduler.
  fields:
    entity_id:
      name: Entity
      required: true
      selector:
        entity:
          domain:
            - switch
            - valve
            - cover
            - input_boolean
            - light
    label:
      name: Label
      description: Used to match calendar event summaries.
      required: true
      example: "Front lawn"
      selector:
        text:
    default_duration_minutes:
      name: Default duration (minutes)
      required: false
      default: 10
      selector:
        number:
          min: 1
          max: 1440
          step: 1
          unit_of_measurement: min
    enabled:
      name: Enabled
      required: false
      default: true
      selector:
        boolean:

remove_valve:
  name: Remove valve
  description: Unregister a valve and delete its schedules.
  fields:
    entity_id:
      name: Entity
      required: true
      selector:
        entity:
          domain:
            - switch
            - valve
            - cover
            - input_boolean
            - light

add_schedule:
  name: Add schedule
  description: Schedule a recurring run at a fixed time on selected days.
  fields:
    valve_entity_id:
      name: Valve entity
      required: true
      selector:
        entity:
          domain:
            - switch
            - valve
            - cover
            - input_boolean
            - light
    time:
      name: Time
      description: HH:MM (24h) local time.
      required: true
      example: "06:30"
      selector:
        time:
    duration_minutes:
      name: Duration (minutes)
      required: true
      selector:
        number:
          min: 1
          max: 1440
          step: 1
          unit_of_measurement: min
    days:
      name: Days
      required: true
      selector:
        select:
          multiple: true
          options:
            - mon
            - tue
            - wed
            - thu
            - fri
            - sat
            - sun
    name:
      name: Name
      required: false
      selector:
        text:
    enabled:
      name: Enabled
      required: false
      default: true
      selector:
        boolean:

update_schedule:
  name: Update schedule
  description: Patch an existing schedule by id. Any omitted field is left unchanged.
  fields:
    schedule_id:
      name: Schedule ID
      required: true
      selector:
        text:
    name:
      name: Name
      required: false
      selector:
        text:
    time:
      name: Time
      required: false
      example: "06:30"
      selector:
        time:
    duration_minutes:
      name: Duration (minutes)
      required: false
      selector:
        number:
          min: 1
          max: 1440
          step: 1
          unit_of_measurement: min
    days:
      name: Days
      required: false
      selector:
        select:
          multiple: true
          options:
            - mon
            - tue
            - wed
            - thu
            - fri
            - sat
            - sun
    enabled:
      name: Enabled
      required: false
      selector:
        boolean:

remove_schedule:
  name: Remove schedule
  description: Delete a schedule by its id (find via list_config).
  fields:
    schedule_id:
      name: Schedule ID
      required: true
      selector:
        text:

add_cycle:
  name: Add cycle
  description: Create a cycle that runs a list of valves sequentially.
  fields:
    name:
      name: Name
      description: Also used to match calendar events.
      required: true
      selector:
        text:
    steps:
      name: Steps
      description: Ordered list. Each step = entity_id + duration_minutes.
      required: true
      selector:
        object:
    enabled:
      name: Enabled
      required: false
      default: true
      selector:
        boolean:

update_cycle:
  name: Update cycle
  description: Patch an existing cycle. Any omitted field is left unchanged.
  fields:
    cycle_id:
      name: Cycle ID
      required: true
      selector:
        text:
    name:
      name: Name
      required: false
      selector:
        text:
    steps:
      name: Steps
      required: false
      selector:
        object:
    enabled:
      name: Enabled
      required: false
      selector:
        boolean:

remove_cycle:
  name: Remove cycle
  description: Delete a cycle by id. Also deletes any schedules targeting it.
  fields:
    cycle_id:
      name: Cycle ID
      required: true
      selector:
        text:

run_cycle:
  name: Run cycle
  description: Start a cycle now. Runs each step's valve for its duration, sequentially.
  fields:
    cycle_id:
      name: Cycle ID
      required: true
      selector:
        text:

stop_cycle:
  name: Stop cycle
  description: Cancel a running cycle and close the currently open valve.
  fields:
    cycle_id:
      name: Cycle ID
      required: true
      selector:
        text:

list_config:
  name: List config
  description: Returns the registered valves, schedules, cycles, active runs, active cycles, and recent history.
